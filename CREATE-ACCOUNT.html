<!DOCTYPE html>
<html lang="en">
<head>
<title>Fill this form to create your account - Ubuzima Hub</title>
</head>

<body style="font-family: 'Times New Roman', Times, serif; background:#001604; margin:0;">

<div style="width:90%;max-width:400px;margin:80px auto;background:white;padding:20px; border-radius:10px;box-shadow:0 0 10px rgba(0, 0, 0, 0.1);">

    <h2 style="text-align:center; font-family: 'Times New Roman', Times, serif; color:#1976d2;">Create your account</h2>

    <!-- FULL NAME -->
    <input type="text" placeholder="Type your full name" style="width:100%;padding:10px;margin:10px 0;border-radius:5px;border:1px solid #ccc;required">

    <!-- INSERT PASSWORD -->
    <input type="insert your password" placeholder="Password" style="width:100%;padding:10px;margin:10px 0;border-radius:5px;border:1px solid #ccc;required">
    <!--CONFIRM PASSWORD-->
    <input type="Confirm your password" placeholder="confirm Password" style="width:100%;padding:10px;margin:10px 0;border-radius:5px;border:1px solid #ccc;required">

    <input type="text" placeholder="Type your district" style="width:100%;padding:10px;margin:10px 0;border-radius:5px;border:1px solid #ccc;required">

    <input type="text" placeholder="type your sector" style="width:100%;padding:10px;margin:10px 0;border-radius:5px;border:1px solid #ccc;required">

    <input type="text" placeholder="Type your email" style="width:100%;padding:10px;margin:10px 0;border-radius:5px;border:1px solid #ccc;required">

    <input type="number" placeholder="Enter your age" style="width:100%;padding:10px;margin:10px 0;border-radius:5px;border:1px solid #ccc;required">

    <select id="gender" name="gender">
        <option value="">select gender</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
    </select>

        <select id="gender" name="Disability">
        <option value="">Disability option</option>
        <option value="None">None</option>
        <option value="Visual support">Visual Disability</option>
        <option value="Hearing support">Hearing Disability</option>
        <option value="Other">Other</option>
    </select>

    <button style="width:100%;padding:10px;background:#1976d2;color:white;border:none;border-radius:5px;font-weight:bold;cursor:pointer;">create account
    </button>

</div>

</body>
</html>
