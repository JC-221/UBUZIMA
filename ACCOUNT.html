<!DOCTYPE html>
<html lang="en">
<head>
<title>Login - Ubuzima Hub</title>
</head>

<body style="font-family: 'Times New Roman', Times, serif; background:#001604; margin:0;">

<div style="width:90%;max-width:400px;margin:80px auto;background:white;padding:20px; border-radius:10px;box-shadow:0 0 10px rgba(0, 0, 0, 0.1);">

    <h2 style="text-align:center; font-family: 'Times New Roman', Times, serif; color:#1976d2;">Login</h2>

    <!-- USERNAME -->
    <input type="text" placeholder="Username" style="width:100%;padding:10px;margin:10px 0;border-radius:5px;border:1px solid #ccc;required">

    <!-- PASSWORD -->
    <input type="password" placeholder="Password" style="width:100%;padding:10px;margin:10px 0;border-radius:5px;border:1px solid #ccc;required">

    <!-- LOGIN BUTTON -->
    <button style="width:100%;padding:10px;background:#1976d2;color:white;border:none;border-radius:5px;font-weight:bold;cursor:pointer;">
        Login
    </button>

    <!-- LINK TO CREATE ACCOUNT PAGE -->
    <p style="text-align:center;margin-top:15px;">
        Don't have an account?
        <a href="CREATE-ACCOUNT.html" style="color:#1976d2; text-decoration:none; font-weight:bold;">
            Create Account
        </a>
    </p>

</div>

</body>
</html>
